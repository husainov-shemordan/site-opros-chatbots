[theme]
# Основной неоновый цвет для активных элементов, радиокнопок и ползунков
primaryColor = "#6366f1"

# Глубокий темный фон самого приложения
backgroundColor = "#0f172a"

# Цвет боковой панели (сайдбара) и подложки под графики/формы
secondaryBackgroundColor = "#1e293b"

# Цвет основного текста (бело-голубой, контрастный)
textColor = "#f8fafc"

# Стандартный чистый шрифт
font = "sans serif"

[server]
# Настройки для стабильного деплоя в облако
headless = true
enableCORS = false
enableXsrfProtection = false
